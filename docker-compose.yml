services:
  supabase-cli:
    build:
      context: .
      dockerfile: Dockerfile.supabase
    image: domino-supabase-cli
    volumes:
      - ./:/workspace
    environment:
      SUPABASE_ACCESS_TOKEN: ${SUPABASE_ACCESS_TOKEN}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF}
