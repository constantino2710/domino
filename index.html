<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominó Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a5c2a;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LOBBY ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
  }
  #lobby h1 { font-size: 2.4rem; letter-spacing: 2px; margin-bottom: 8px; }
  #lobby input {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
    width: 240px;
    background: #ffffffee;
    color: #222;
  }
  #lobby button, #startBtn, #playAgainBtn {
    padding: 10px 28px;
    border-radius: 8px;
    border: none;
    background: #f5c518;
    color: #222;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background .2s;
  }
  #lobby button:hover, #startBtn:hover, #playAgainBtn:hover { background: #ffd740; }
  #lobbyStatus { font-size: .95rem; opacity: .8; margin-top: 4px; }
  #playerList { list-style: none; margin-top: 8px; }
  #playerList li { background: #ffffff22; border-radius: 6px; padding: 6px 18px; margin: 3px 0; text-align:center; }

  /* ── GAME ── */
  #game { display: none; flex-direction: column; height: 100vh; }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px;
    background: #0e3d1a;
    font-size: .9rem;
    flex-shrink: 0;
  }
  #turnInfo { font-weight: bold; font-size: 1rem; }
  #scoreBoard span { margin-left: 14px; }

  #boardArea {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #1a5c2a;
  }
  #boardCanvas { display: block; }

  #bottomArea {
    background: #0e3d1a;
    padding: 10px 12px;
    flex-shrink: 0;
  }
  #handLabel { font-size: .8rem; opacity: .7; margin-bottom: 6px; }
  #hand {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 72px;
    align-items: center;
  }

  /* ── DOMINO TILE ── */
  .tile {
    width: 40px;
    height: 72px;
    background: #fffff0;
    border-radius: 5px;
    border: 2px solid #ccc;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
    padding: 4px 2px;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    user-select: none;
    flex-shrink: 0;
  }
  .tile:hover { transform: translateY(-6px); border-color: #f5c518; box-shadow: 0 4px 12px #0008; }
  .tile.selected { border-color: #f5c518; transform: translateY(-10px); box-shadow: 0 6px 16px #0009; }
  .tile .half {
    width: 32px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tile .divider { width: 80%; height: 1px; background: #bbb; }

  /* pips */
  .pip-grid {
    display: grid;
    width: 28px;
    height: 24px;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 1px;
  }
  .pip {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #222;
    place-self: center;
    display: none;
  }

  /* ── SIDE SELECTOR ── */
  #sideSelector {
    display: none;
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    background: #0e3d1a;
    border: 2px solid #f5c518;
    border-radius: 10px;
    padding: 10px 18px;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }
  #sideSelector.show { display: flex; }
  #sideSelector button {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    font-size: .95rem;
    cursor: pointer;
    background: #f5c518;
    color: #222;
  }
  #sideSelector button:hover { background: #ffd740; }
  #sideSelector .cancel {
    background: #555; color: #fff;
  }

  /* ── NOTIFICATIONS ── */
  #notif {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #222d;
    color: #fff;
    padding: 8px 22px;
    border-radius: 20px;
    font-size: .95rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity .4s;
    z-index: 20;
  }
  #notif.show { opacity: 1; }

  /* ── OVERLAY (round end) ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000a;
    z-index: 30;
    align-items: center;
    justify-content: center;
  }
  #overlay.show { display: flex; }
  #overlayBox {
    background: #1a5c2a;
    border: 3px solid #f5c518;
    border-radius: 14px;
    padding: 32px 48px;
    text-align: center;
    min-width: 280px;
  }
  #overlayBox h2 { font-size: 1.6rem; margin-bottom: 12px; }
  #overlayBox p { margin: 4px 0; font-size: 1rem; opacity: .9; }
  #overlayBox table { margin: 14px auto; border-collapse: collapse; }
  #overlayBox td { padding: 4px 16px; font-size: 1rem; }
  #overlayBox .pts { font-weight: bold; color: #f5c518; }

  #passBtn {
    margin-top: 8px;
    padding: 8px 22px;
    border-radius: 8px;
    border: none;
    background: #555;
    color: #fff;
    font-size: .9rem;
    cursor: pointer;
  }
  #passBtn:hover { background: #777; }
  #passBtn:disabled { opacity: .3; cursor: default; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🁣 Dominó</h1>
  <input id="nameInput" placeholder="Seu nome" maxlength="20">
  <input id="roomInput" placeholder="Código da sala (ex: sala1)" maxlength="20">
  <button id="joinBtn">Entrar na Sala</button>
  <div id="lobbyStatus"></div>
  <ul id="playerList"></ul>
  <button id="startBtn" style="display:none">Iniciar Partida</button>
</div>

<!-- GAME -->
<div id="game">
  <div id="topBar">
    <span id="turnInfo">–</span>
    <span id="scoreBoard"></span>
    <button id="passBtn" disabled>Passar</button>
  </div>
  <div id="boardArea">
    <canvas id="boardCanvas"></canvas>
  </div>
  <div id="bottomArea">
    <div id="handLabel">Sua mão:</div>
    <div id="hand"></div>
  </div>
</div>

<!-- Side selector -->
<div id="sideSelector">
  <span style="font-size:.9rem;color:#ccc">Onde encaixar?</span>
  <button id="leftBtn">← Esquerda</button>
  <button id="rightBtn">Direita →</button>
  <button class="cancel" id="cancelBtn">✕</button>
</div>

<!-- Notifications -->
<div id="notif"></div>

<!-- Round end overlay -->
<div id="overlay">
  <div id="overlayBox">
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <table id="overlayScores"></table>
    <br>
    <button id="playAgainBtn" style="display:none">Jogar Novamente</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const S = {
  ws: null,
  name: '',
  room: '',
  playerIndex: -1,
  isHost: false,
  state: null,         // last server state
  selectedPiece: null, // [a,b]
  myTurn: false,
};

// ── DOM refs ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const lobby       = $('lobby');
const game        = $('game');
const joinBtn     = $('joinBtn');
const startBtn    = $('startBtn');
const passBtn     = $('passBtn');
const nameInput   = $('nameInput');
const roomInput   = $('roomInput');
const lobbyStatus = $('lobbyStatus');
const playerList  = $('playerList');
const turnInfo    = $('turnInfo');
const scoreBoard  = $('scoreBoard');
const handEl      = $('hand');
const sideSelector = $('sideSelector');
const leftBtn     = $('leftBtn');
const rightBtn    = $('rightBtn');
const cancelBtn   = $('cancelBtn');
const overlay     = $('overlay');
const overlayTitle = $('overlayTitle');
const overlayMsg   = $('overlayMsg');
const overlayScores = $('overlayScores');
const playAgainBtn  = $('playAgainBtn');
const canvas      = $('boardCanvas');
const ctx         = canvas.getContext('2d');
const boardArea   = $('boardArea');

// ── Notify ─────────────────────────────────────────────
let notifTimer;
function notify(msg, duration = 2800) {
  const el = $('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── WebSocket ──────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);
  S.ws = ws;

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', name: S.name, room: S.room }));
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handle(msg);
  };

  ws.onclose = () => notify('Conexão encerrada.', 5000);
  ws.onerror = () => notify('Erro de conexão com o servidor.', 5000);
}

function send(obj) {
  if (S.ws && S.ws.readyState === 1)
    S.ws.send(JSON.stringify(obj));
}

// ── Message handler ────────────────────────────────────
function handle(msg) {
  switch (msg.type) {
    case 'joined':
      S.playerIndex = msg.playerIndex;
      S.isHost = msg.playerIndex === 0;
      lobbyStatus.textContent = `Sala: ${msg.roomId}`;
      if (S.isHost) startBtn.style.display = '';
      break;

    case 'lobby':
      playerList.innerHTML = msg.players.map(n => `<li>${n}</li>`).join('');
      lobbyStatus.textContent = `Sala: ${S.room} — ${msg.count} jogador(es)`;
      break;

    case 'started':
      lobby.style.display = 'none';
      game.style.display = 'flex';
      overlay.classList.remove('show');
      break;

    case 'state':
      S.state = msg;
      S.myTurn = msg.currentTurn === S.playerIndex;
      renderState();
      break;

    case 'passed':
      notify(`${msg.player} passou a vez.`);
      break;

    case 'roundEnd':
      showRoundEnd(msg);
      break;

    case 'playerLeft':
      notify('Um jogador saiu da sala.', 4000);
      break;

    case 'error':
      notify('⚠ ' + msg.message, 3500);
      break;
  }
}

// ── Render ─────────────────────────────────────────────
function renderState() {
  const st = S.state;
  if (!st) return;

  // top bar
  const cp = st.players[st.currentTurn];
  turnInfo.textContent = st.currentTurn === S.playerIndex
    ? '🎯 Sua vez!'
    : `Vez de: ${cp.name}`;

  scoreBoard.innerHTML = st.players
    .map(p => `<span>${p.name}: <b>${p.score}</b></span>`)
    .join('');

  passBtn.disabled = !S.myTurn;

  // hand
  renderHand(st.hand);

  // board
  drawBoard(st.board, st.boardEnds);
}

// ── Hand ───────────────────────────────────────────────
function renderHand(hand) {
  handEl.innerHTML = '';
  for (const piece of hand) {
    const el = makeTileEl(piece);
    el.addEventListener('click', () => selectPiece(piece, el));
    if (S.selectedPiece && S.selectedPiece[0] === piece[0] && S.selectedPiece[1] === piece[1])
      el.classList.add('selected');
    handEl.appendChild(el);
  }
}

function makeTileEl(piece) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.appendChild(pipHalf(piece[0]));
  const div = document.createElement('div');
  div.className = 'divider';
  el.appendChild(div);
  el.appendChild(pipHalf(piece[1]));
  return el;
}

function pipHalf(n) {
  const half = document.createElement('div');
  half.className = 'half';
  const grid = document.createElement('div');
  grid.className = 'pip-grid';
  // 9 cells, which to show per number
  const patterns = {
    0: [],
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8],
  };
  for (let i = 0; i < 9; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (patterns[n].includes(i)) pip.style.display = 'block';
    grid.appendChild(pip);
  }
  half.appendChild(grid);
  return half;
}

// ── Piece selection + side chooser ────────────────────
function selectPiece(piece, el) {
  if (!S.myTurn) { notify('Não é sua vez.'); return; }

  // deselect if already selected
  if (S.selectedPiece && S.selectedPiece[0] === piece[0] && S.selectedPiece[1] === piece[1]) {
    S.selectedPiece = null;
    sideSelector.classList.remove('show');
    renderHand(S.state.hand);
    return;
  }

  S.selectedPiece = piece;
  renderHand(S.state.hand);

  // if board is empty, just play — no side needed
  if (!S.state.boardEnds) {
    sendPlay(piece, 'right');
    return;
  }

  // check which sides fit
  const ends = S.state.boardEnds;
  const fitsLeft  = piece[0] === ends.left || piece[1] === ends.left;
  const fitsRight = piece[0] === ends.right || piece[1] === ends.right;

  if (!fitsLeft && !fitsRight) {
    notify('Essa peça não encaixa em nenhum lado.');
    S.selectedPiece = null;
    renderHand(S.state.hand);
    return;
  }
  if (fitsLeft && !fitsRight) { sendPlay(piece, 'left'); return; }
  if (!fitsLeft && fitsRight) { sendPlay(piece, 'right'); return; }

  // both sides fit → ask
  sideSelector.classList.add('show');
}

function sendPlay(piece, side) {
  send({ type: 'play', piece, side });
  S.selectedPiece = null;
  sideSelector.classList.remove('show');
}

leftBtn.addEventListener('click',   () => S.selectedPiece && sendPlay(S.selectedPiece, 'left'));
rightBtn.addEventListener('click',  () => S.selectedPiece && sendPlay(S.selectedPiece, 'right'));
cancelBtn.addEventListener('click', () => {
  S.selectedPiece = null;
  sideSelector.classList.remove('show');
  renderHand(S.state.hand);
});

passBtn.addEventListener('click', () => send({ type: 'pass' }));

// ── Board canvas ───────────────────────────────────────
const TW = 36, TH = 64, GAP = 4; // tile width/height

function drawBoard(board, ends) {
  if (!board || board.length === 0) {
    canvas.width = boardArea.clientWidth;
    canvas.height = boardArea.clientHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff33';
    ctx.font = '16px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Aguardando primeira peça...', canvas.width / 2, canvas.height / 2);
    return;
  }

  // layout: horizontal chain, each tile is TW×TH (portrait) or TH×TW (landscape)
  // we'll draw them all portrait (narrow side = left/right connecting side)
  // total width
  const total = board.length;
  const canvasW = Math.max(boardArea.clientWidth, total * (TW + GAP) + 60);
  const canvasH = Math.max(boardArea.clientHeight, TH + 80);
  canvas.width = canvasW;
  canvas.height = canvasH;

  ctx.clearRect(0, 0, canvasW, canvasH);

  const startX = Math.max(30, (canvasW - total * (TW + GAP)) / 2);
  const y = canvasH / 2 - TH / 2;

  for (let i = 0; i < board.length; i++) {
    const { piece, flipped } = board[i];
    const x = startX + i * (TW + GAP);
    const a = flipped ? piece[1] : piece[0];
    const b = flipped ? piece[0] : piece[1];
    drawTileCanvas(x, y, a, b);
  }

  // show open ends
  if (ends) {
    ctx.fillStyle = '#f5c518';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`◄ ${ends.left}`, startX - 16, y + TH / 2 + 5);
    ctx.fillText(`${ends.right} ►`, startX + total * (TW + GAP) + 8, y + TH / 2 + 5);
  }

  // scroll to end
  boardArea.scrollLeft = boardArea.scrollWidth;
}

function drawTileCanvas(x, y, a, b) {
  // shadow
  ctx.shadowColor = '#0005';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;

  // background
  ctx.fillStyle = '#fffff0';
  roundRect(ctx, x, y, TW, TH, 4);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // border
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, TW, TH, 4);
  ctx.stroke();

  // divider
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + TH / 2);
  ctx.lineTo(x + TW - 4, y + TH / 2);
  ctx.stroke();

  // pips
  drawPipsCanvas(x, y, a, true);
  drawPipsCanvas(x, y, b, false);
}

function drawPipsCanvas(tx, ty, n, top) {
  const offsetY = top ? ty + 4 : ty + TH / 2 + 4;
  const halfH = TH / 2 - 8;
  const cellW = TW / 3;
  const cellH = halfH / 3;
  const r = 3.5;
  const patterns = {
    0: [],
    1: [[1,1]],
    2: [[0,0],[2,2]],
    3: [[0,0],[1,1],[2,2]],
    4: [[0,0],[0,2],[2,0],[2,2]],
    5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
    6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  };
  ctx.fillStyle = '#222';
  for (const [col, row] of (patterns[n] || [])) {
    const cx = tx + col * cellW + cellW / 2;
    const cy = offsetY + row * cellH + cellH / 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Round end overlay ──────────────────────────────────
function showRoundEnd(msg) {
  overlayTitle.textContent = `🏆 ${msg.winner} venceu!`;
  overlayMsg.textContent = msg.reason === 'blocked'
    ? `Jogo travado — menor soma vence. +${msg.points} pts`
    : `+${msg.points} pontos`;

  overlayScores.innerHTML = '<tr><th>Jogador</th><th>Pontos</th></tr>' +
    msg.scores.map(s =>
      `<tr><td>${s.name}</td><td class="pts">${s.score}</td></tr>`
    ).join('');

  playAgainBtn.style.display = S.isHost ? '' : 'none';
  overlay.classList.add('show');
}

playAgainBtn.addEventListener('click', () => {
  send({ type: 'playAgain' });
});

// ── Join / Start ───────────────────────────────────────
joinBtn.addEventListener('click', () => {
  const name = nameInput.value.trim() || 'Jogador';
  const room = roomInput.value.trim() || 'default';
  S.name = name;
  S.room = room;
  connect();
  joinBtn.disabled = true;
  lobbyStatus.textContent = 'Conectando...';
});

startBtn.addEventListener('click', () => send({ type: 'start' }));

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') roomInput.focus(); });
roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });

// resize canvas on window resize
window.addEventListener('resize', () => {
  if (S.state) drawBoard(S.state.board, S.state.boardEnds);
});
</script>
</body>
</html>
